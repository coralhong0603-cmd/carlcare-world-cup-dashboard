<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carlcare Africa Facebook World Cup Dashboard</title>
<style>
:root{--ink:#1f2a44;--muted:#667085;--line:#e8edf7;--panel:rgba(255,255,255,.76);--blue:#5b6ff1;--cyan:#43d1c7;--shadow:0 22px 70px rgba(64,83,160,.14)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 74% 0%,rgba(67,209,199,.22),transparent 32%),radial-gradient(circle at 88% 18%,rgba(237,120,196,.18),transparent 28%),linear-gradient(135deg,#fbfcff 0%,#f6f8ff 58%,#fdfbff 100%)}.shell{max-width:1440px;margin:0 auto;padding:28px 28px 38px}header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:18px}.eyebrow{display:inline-flex;align-items:center;height:28px;padding:0 12px;border-radius:999px;background:#edf4ff;color:#4269de;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}h1{font-size:34px;line-height:1.06;margin:10px 0 8px;font-weight:820;letter-spacing:0}p{margin:0;color:var(--muted);line-height:1.55;font-size:14px}.switcher{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}.switcher span{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:800}button,a.open-tab{height:38px;border:1px solid var(--line);border-radius:14px;background:#fff;color:#3f63e6;font-weight:800;padding:0 14px;cursor:pointer;box-shadow:0 8px 20px rgba(63,99,230,.08);text-decoration:none;display:inline-flex;align-items:center}button.active{background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;border-color:transparent}.frame-wrap{height:calc(100vh - 156px);min-height:680px;border:1px solid rgba(255,255,255,.9);border-radius:24px;background:var(--panel);box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(16px)}iframe{display:block;width:100%;height:100%;border:0;background:#fff}@media(max-width:760px){.shell{padding:20px 14px}header{display:grid}.switcher{justify-content:flex-start}h1{font-size:27px}.frame-wrap{height:calc(100vh - 210px);min-height:620px;border-radius:18px}}
</style>
</head>
<body>
<main class="shell">
<header>
  <div><span class="eyebrow">World Cup Data Hub</span><h1>Carlcare Africa Facebook World Cup Dashboard</h1><p>Default view shows the latest available date. Use the date button to review archived daily versions.</p></div>
  <div class="switcher"><span>Version</span><button type="button" data-date="2026-07-09" class="">2026-07-09</button><button type="button" data-date="2026-07-10" class="active">2026-07-10</button><a class="open-tab" id="openTab" href="2026-07-10/index.html" target="_blank" rel="noopener">Open</a></div>
</header>
<section class="frame-wrap"><iframe id="dashboardFrame" src="2026-07-10/index.html" title="Carlcare dashboard"></iframe></section>
</main>
<script>
const frame = document.getElementById('dashboardFrame');
const openTab = document.getElementById('openTab');
document.querySelectorAll('button[data-date]').forEach(button => {
  button.addEventListener('click', () => {
    document.querySelectorAll('button[data-date]').forEach(item => item.classList.remove('active'));
    button.classList.add('active');
    const date = button.dataset.date;
    frame.src = date + '/index.html';
    openTab.href = date + '/index.html';
  });
});
</script>
</body>
</html>
